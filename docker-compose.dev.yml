name: idle-mmorpg-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: idle-mmo-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: idlemmo
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: idlemmo
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idlemmo -d idlemmo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: idle-mmo-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6381:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data_dev:
  redis_data_dev:
