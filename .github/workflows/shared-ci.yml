name: shared-ci

on:
  push:
    branches: [main]
    paths:
      - "shared/**"
      - ".github/workflows/shared-ci.yml"
  pull_request:
    paths:
      - "shared/**"
      - ".github/workflows/shared-ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:SkipUnityCopy=true

      - name: Test
        run: dotnet test -c Release --no-build --logger "trx;LogFileName=shared-tests.trx" --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-test-results
          path: shared/**/TestResults/**/*.trx

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-coverage
          path: shared/**/TestResults/**/coverage.cobertura.xml

      - name: Upload shared DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: idle-mmo-shared-dll
          path: shared/src/IdleMmo.Shared/bin/Release/netstandard2.1/IdleMmo.Shared.*
