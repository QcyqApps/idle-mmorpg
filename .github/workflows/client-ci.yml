name: client-ci

on:
  workflow_dispatch:
    inputs:
      build_target:
        type: choice
        description: Build target
        default: Android
        options:
          - Android
  push:
    tags:
      - "client-v*"

jobs:
  build-android:
    name: Build Android (GameCI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: client/Library
          key: Library-${{ hashFiles('client/Assets/**', 'client/Packages/**', 'client/ProjectSettings/**') }}
          restore-keys: |
            Library-

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build shared lib (copies DLL into client/Assets/Plugins)
        working-directory: shared
        run: dotnet build -c Release --no-restore --restore

      - name: Build Android (GameCI)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: client
          targetPlatform: ${{ inputs.build_target || 'Android' }}
          androidExportType: androidPackage
          buildName: idle-mmorpg

      - name: Upload Android build artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/Android/
